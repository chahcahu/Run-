name: Build Immich Run File

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y makeself wget

      - name: Create workspace
        run: |
          mkdir -p immich

      - name: Download Immich compose
        run: |
          wget -O immich/docker-compose.yml \
          https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml

          wget -O immich/.env \
          https://github.com/immich-app/immich/releases/latest/download/example.env

      - name: Create install.sh
        run: |
          cat > immich/install.sh << 'EOF'
          #!/bin/sh

          set -e

          cd "$(dirname "$0")"

          echo "================================="
          echo "Immich Upgrade Installer"
          echo "================================="

          mkdir -p /opt/immich

          # 首次安装时保存配置
          if [ ! -f /opt/immich/docker-compose.yml ]; then
              cp docker-compose.yml /opt/immich/
          fi

          if [ ! -f /opt/immich/.env ]; then
              cp .env /opt/immich/
          fi

          cd /opt/immich

          echo "[1/4] Stop old containers..."
          docker compose down || true

          echo "[2/4] Pull latest images..."
          docker compose pull

          echo "[3/4] Start Immich..."
          docker compose up -d

          echo "[4/4] Clean old dangling images..."
          docker image prune -f || true

          echo ""
          echo "================================="
          echo "Immich upgrade completed"
          echo "Web UI: http://$(hostname -I | awk '{print $1}'):2283"
          echo "================================="
          EOF

          chmod +x immich/install.sh

      - name: Make run package
        run: |
          mkdir -p output

          makeself immich output/immich.run \
          "Immich Upgrade Installer" ./install.sh

      - name: Delete old release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete immich-latest -y || true
          git push origin :refs/tags/immich-latest || true

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: immich-latest
          name: Immich Latest
          files: output/*.run
